<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animality System</title>

<style>

/* ===== BACKGROUND ===== */
body {
  margin: 0;
  font-family: Georgia, serif;
  background-image: url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #1a1025;
}

/* purple overlay */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(35, 10, 60, 0.55);
  z-index: 0;
}

/* ===== PAPER CARD ===== */
.paper {
  position: relative;
  z-index: 1;

  max-width: 900px;
  margin: 60px auto;
  padding: 40px;

  background: rgba(255, 250, 240, 0.92);
  border-radius: 18px;

  box-shadow: 0 0 50px rgba(0,0,0,0.4);
}

/* ===== TITLE ===== */
h1 {
  text-align: center;
  letter-spacing: 4px;
  margin-bottom: 10px;
}

/* ===== NAV GRID ===== */
.nav {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin-top: 30px;
}

.nav a {
  text-decoration: none;
  text-align: center;
  padding: 10px;
  border-radius: 10px;

  background: rgba(80, 40, 120, 0.1);
  color: #2a143a;

  border: 1px solid rgba(80, 40, 120, 0.2);
}

.nav a:hover {
  background: rgba(120, 80, 180, 0.25);
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .paper {
    margin: 20px;
    padding: 20px;
  }
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="paper">

<h1>ANIMALITY</h1>

<p style="text-align:center;">
the Animalistic Tendencies of a Human
</p>

  <a href="#">Cat</a>

</div>

<hr style="margin-top:30px; opacity:0.3;">

<p>
This is a structural framework describing instinctive behavioral shifts following disruption of internal stability. 
</p>

</div>

</body>
</html>
