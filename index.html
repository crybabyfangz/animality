<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animality System</title>

<style>

/* ===== BACKGROUND ===== */
body {
  margin: 0;
  font-family: Georgia, serif;
  background-image: url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #1a1025;
}

/* purple overlay */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(35, 10, 60, 0.55);
  z-index: 0;
}

/* ===== PAPER CARD ===== */
.paper {
  position: relative;
  z-index: 1;

  max-width: 900px;
  margin: 60px auto;
  padding: 40px;

  background: rgba(255, 250, 240, 0.92);
  border-radius: 18px;

  box-shadow: 0 0 50px rgba(0,0,0,0.4);
}

/* ===== TITLE ===== */
h1 {
  text-align: center;
  letter-spacing: 4px;
  margin-bottom: 10px;
}

/* ===== NAV GRID ===== */
.nav {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin-top: 30px;
}

.nav button {
  text-align: center;
  padding: 10px;
  border-radius: 10px;

  background: rgba(80, 40, 120, 0.1);
  color: #2a143a;

  border: 1px solid rgba(80, 40, 120, 0.2);
  cursor: pointer;
}

.nav button:hover {
  background: rgba(120, 80, 180, 0.25);
}

/* ===== CONTENT ===== */
#content {
  margin-top: 20px;
  animation: fade 0.25s ease;
}

@keyframes fade {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ===== BACK BUTTON ===== */
.back-btn {
  margin-top: 30px;
  display: block;
  text-align: center;
  padding: 10px;
  border-radius: 10px;

  background: rgba(80, 40, 120, 0.1);
  color: #2a143a;

  border: 1px solid rgba(80, 40, 120, 0.2);
  cursor: pointer;
}

.back-btn:hover {
  background: rgba(120, 80, 180, 0.25);
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .paper {
    margin: 20px;
    padding: 20px;
  }
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="paper">

<h1>ANIMALITY</h1>

<p style="text-align:center;">
the Animalistic Tendencies of a Human
</p>

<div class="nav">
  <button onclick="loadPage('Trigger.html')">Trigger</button>
  <button onclick="loadPage('Mechanics.html')">How to Type</button>
  <button onclick="loadPage('Wolf.html')">Wolf</button>
  <button onclick="loadPage('Fox.html')">Fox</button>
  <button onclick="loadPage('Lion.html')">Lion</button>
  <button onclick="loadPage('Dog.html')">Dog</button>
  <button onclick="loadPage('Rabbit.html')">Rabbit</button>
  <button onclick="loadPage('Cat.html')">Cat</button>
  <button onclick="loadPage('Bear.html')">Bear</button>
  <button onclick="loadPage('Scorpion.html')">Scorpion</button>
  <button onclick="loadPage('Elk.html')">Elk</button>
</div>

<hr style="margin-top:30px; opacity:0.3;">

<!-- ===== CONTENT AREA ===== -->
<div id="content">
  <p>
  This is a structural framework describing instinctive behavioral shifts following disruption of internal stability. Made by @kiko.zip on discord!
  </p>
</div>

<!-- ===== BACK BUTTON ===== -->
<button class="back-btn" onclick="goHome()">Back to Home</button>

</div>

<script>
const homeContent = `
<p>
This is a structural framework describing instinctive behavioral shifts following disruption of internal stability.
</p>
`;

async function loadPage(page) {
  const content = document.getElementById("content");

  content.innerHTML = "<p>Loading...</p>";

  try {
    const response = await fetch(page);
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    content.innerHTML = doc.body.innerHTML;

  } catch (err) {
    content.innerHTML = "<p>Failed to load content.</p>";
    console.error(err);
  }
}

function goHome() {
  document.getElementById("content").innerHTML = homeContent;
}
</script>

</body>
</html>
